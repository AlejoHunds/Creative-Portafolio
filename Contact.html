<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Deyver Escobar</title>
<link rel="stylesheet" href="ContactS.css">
</head>

<body>

<a href="index.html" class="back-bubble">Home</a>


<section class="contact-section">

<h1>Contact</h1>

<p class="contact-intro">
If you would like to collaborate, discuss a project or simply get in touch,
leave your information below and I will respond as soon as possible.
</p>


<form action="https://formspree.io/f/yourID" method="POST" class="contact-form">

<label>Name</label>
<input type="text" name="name" required>

<label>Email</label>
<input type="email" name="email" required>

<label>Phone Number</label>
<input type="tel" name="phone">

<label>Message</label>
<textarea name="message" rows="5" required></textarea>

<button type="submit">Send Message</button>

</form>

</section>

</body>
</html>
